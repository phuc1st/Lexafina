server.port=8080
spring.application.name=lexafina
spring.jackson.default-property-inclusion=non_null
spring.profiles.active=dev

lexafina.data-path=../data

# JWT — đổi secret trong production (>= 256 bit cho HS256)
app.jwt.secret=${JWT_SECRET:dev-change-me-to-at-least-32-bytes-long-secret!!}
app.jwt.access-ttl-min=${JWT_ACCESS_TTL_MIN:60}
app.jwt.refresh-ttl-days=${JWT_REFRESH_TTL_DAYS:14}
app.cookie.secure=${COOKIE_SECURE:false}
